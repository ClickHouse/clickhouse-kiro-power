name: Sync Agent Skills

on:
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday at 6am UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: <FILL_IN_CH_KIRO_APP_ID>
          private-key: ${{ secrets.CH_KIRO_GITHUB_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          submodules: true

      - name: Update submodule to latest
        run: git submodule update --init --remote submodules/agent-skills

      - name: Rebuild steering file with Kiro frontmatter
        run: |
          mkdir -p steering
          cat > steering/clickhouse-best-practices.md << 'FRONTMATTER'
          ---
          inclusion: auto
          name: clickhouse-best-practices
          description: Comprehensive ClickHouse best-practices guide with 28 rules for schema design, query optimization, and insert strategy. Use when designing schemas, creating tables, optimizing queries, choosing ORDER BY keys, planning data ingestion, reviewing ClickHouse configurations, or troubleshooting performance.
          ---

          FRONTMATTER
          cat submodules/agent-skills/skills/clickhouse-best-practices/AGENTS.md \
            >> steering/clickhouse-best-practices.md

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet steering/ submodules/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push changes directly
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add steering/clickhouse-best-practices.md submodules/agent-skills
          git commit -m "sync: update steering from agent-skills"
          git pull --rebase origin main
          git push origin main
